<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>helen-board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card-bg: #1a1d27;
    --text: #e5e7eb;
    --text-dim: #9ca3af;
    --accent: #6366f1;
    --border: #2a2e3a;
    --danger: #f87171;
    --success: #4ade80;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 20px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .subtitle { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 24px; }
  h2.section-title {
    font-size: 1.1rem;
    margin: 28px 0 12px;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
  }
  h3.category-title {
    font-size: 0.95rem;
    margin: 20px 0 8px;
    color: var(--text);
    opacity: 0.85;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  h3.category-title:first-child { margin-top: 4px; }
  .category-title::before {
    content: "";
    width: 3px;
    height: 14px;
    background: var(--accent);
    border-radius: 2px;
    display: inline-block;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }
  .list-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .list-card h3 { margin: 0 0 12px; font-size: 0.95rem; text-transform: capitalize; }
  ul { list-style: none; padding: 0; margin: 0; }
  li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 0;
    font-size: 0.9rem;
    border-bottom: 1px solid var(--border);
  }
  li:last-child { border-bottom: none; }
  li.done .item-title { color: var(--text-dim); text-decoration: line-through; }
  .checkbox { font-size: 1.1rem; }
  .empty-state, .loading-state { color: var(--text-dim); font-size: 0.9rem; font-style: italic; }
  .error-state { color: var(--danger); font-size: 0.9rem; }

  /* Accordion */
  .accordion { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .accordion-item {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .accordion-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
  }
  .accordion-header:hover { background: rgba(99, 102, 241, 0.06); }
  .accordion-title {
    font-weight: 600;
    text-transform: capitalize;
    font-size: 0.95rem;
  }
  .accordion-meta {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-top: 2px;
  }
  .accordion-chevron {
    color: var(--text-dim);
    transition: transform 0.15s ease;
    font-size: 0.9rem;
  }
  .accordion-item.open .accordion-chevron { transform: rotate(180deg); }
  .accordion-body {
    display: none;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
  }
  .accordion-item.open .accordion-body { display: block; }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
    gap: 10px;
    margin: 14px 0;
  }
  .stat-box {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }
  .stat-value { font-size: 1.1rem; font-weight: 700; }
  .stat-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.03em; }
  .trend-up { color: var(--success); }
  .trend-down { color: var(--danger); }
  .trend-flat { color: var(--text-dim); }

  .consistency-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .consistency-note {
    color: var(--text-dim);
    font-size: 0.8rem;
    margin-bottom: 12px;
  }

  .upcoming-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .upcoming-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .upcoming-item:last-child { border-bottom: none; }
  .upcoming-icon { font-size: 1.1rem; flex-shrink: 0; }
  .upcoming-body { flex: 1; min-width: 0; }
  .upcoming-title { font-size: 0.9rem; font-weight: 500; }
  .upcoming-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 1px; }
  .upcoming-when {
    font-size: 0.78rem;
    color: var(--accent);
    white-space: nowrap;
    text-align: right;
    flex-shrink: 0;
  }

  .blocks-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .block-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .block-item:last-child { border-bottom: none; }
  .block-icon { font-size: 1rem; flex-shrink: 0; }
  .block-item.done .block-title { color: var(--text-dim); text-decoration: line-through; }
  .block-item.skipped .block-title { color: var(--text-dim); text-decoration: line-through; }
  .block-item.current .block-title { color: var(--accent); font-weight: 600; }

  .week-wrapper {
    display: flex;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .week-gutter {
    position: relative;
    width: 44px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    background: var(--card-bg);
  }
  .week-gutter-label {
    position: absolute;
    right: 6px;
    transform: translateY(-50%);
    font-size: 0.68rem;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .week-scroll {
    display: flex;
    overflow-x: auto;
    flex: 1;
  }
  .day-column {
    width: 220px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
  }
  .day-column:last-child { border-right: none; }
  .day-column.is-today .day-header { color: var(--accent); font-weight: 700; }
  .day-header {
    padding: 8px 10px;
    font-size: 0.78rem;
    font-weight: 600;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.02);
  }
  .day-timeline {
    position: relative;
    background-image: repeating-linear-gradient(
      to bottom,
      var(--border) 0,
      var(--border) 1px,
      transparent 1px,
      transparent 60px
    );
  }
  .timed-block {
    position: absolute;
    background: rgba(99, 102, 241, 0.25);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 3px 6px;
    font-size: 0.72rem;
    overflow: hidden;
    box-sizing: border-box;
  }
  .timed-block .tb-title { font-weight: 600; line-height: 1.15; }
  .timed-block .tb-time { color: var(--text-dim); font-size: 0.65rem; }
  .timed-block.status-done { opacity: 0.5; text-decoration: line-through; }
  .flexible-list {
    padding: 8px 10px;
    border-top: 1px solid var(--border);
  }
  .flexible-list .flex-empty {
    color: var(--text-dim);
    font-size: 0.72rem;
    font-style: italic;
  }
  .flexible-item {
    font-size: 0.78rem;
    padding: 3px 0;
  }
  .flexible-item.done { color: var(--text-dim); text-decoration: line-through; }
</style>
</head>
<body>
  <h1>helen-board</h1>
  <div class="subtitle">Read-only. Add or edit through Helen via Telegram.</div>

  <h2 class="section-title">Blocks <span style="color:var(--text-dim);font-weight:normal;font-size:0.75rem;">(today)</span></h2>
  <div id="blocks-container" class="loading-state">Loading...</div>

  <h2 class="section-title">Week <span style="color:var(--text-dim);font-weight:normal;font-size:0.75rem;">(scroll to see more days)</span></h2>
  <div id="week-container" class="loading-state">Loading...</div>

  <h2 class="section-title">Upcoming</h2>
  <div id="upcoming-container" class="loading-state">Loading...</div>

  <h2 class="section-title">Consistency <span style="color:var(--text-dim);font-weight:normal;font-size:0.75rem;">(last 7 days)</span></h2>
  <div id="consistency-container" class="loading-state">Loading...</div>

  <h2 class="section-title">Progress</h2>
  <div id="progress-container" class="loading-state">Loading...</div>

  <h2 class="section-title">Lists</h2>
  <div id="lists-container" class="loading-state">Loading...</div>

  <script>
    const API_URL = "https://xdqhuimgpmkkfstntiyk.supabase.co/functions/v1/helen-board";
    const TOKEN = "d7c6ag3zwiejrx4m01qphunob2tk9v8f";

    let openMetricId = null;
    const chartInstances = {};

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function daysAgo(dateStr) {
      const then = new Date(dateStr + "T00:00:00");
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      const diffMs = now - then;
      const diffDays = Math.round(diffMs / (1000 * 60 * 60 * 24));
      if (diffDays === 0) return "today";
      if (diffDays === 1) return "1 day ago";
      return `${diffDays} days ago`;
    }

    async function loadDashboard() {
      const blocksContainer = document.getElementById("blocks-container");
      const weekContainer = document.getElementById("week-container");
      const upcomingContainer = document.getElementById("upcoming-container");
      const consistencyContainer = document.getElementById("consistency-container");
      const progressContainer = document.getElementById("progress-container");
      const listsContainer = document.getElementById("lists-container");

      try {
        const res = await fetch(`${API_URL}?token=${encodeURIComponent(TOKEN)}`);
        if (!res.ok) throw new Error(`Request failed: ${res.status}`);
        const data = await res.json();

        renderBlocks(data.blocks || [], blocksContainer);
        renderWeek(data.weekBlocks || {}, weekContainer);
        renderUpcoming(data.reminders || [], data.events || [], upcomingContainer);
        renderConsistency(data.progress || {}, consistencyContainer);
        renderProgress(data.progress || {}, progressContainer);
        renderLists(data.lists || {}, listsContainer);
      } catch (err) {
        console.error("Failed to load dashboard data:", err);
        blocksContainer.innerHTML = `<div class="error-state">Couldn't load data.</div>`;
        weekContainer.innerHTML = `<div class="error-state">Couldn't load data.</div>`;
        upcomingContainer.innerHTML = `<div class="error-state">Couldn't load data.</div>`;
        consistencyContainer.innerHTML = `<div class="error-state">Couldn't load data.</div>`;
        progressContainer.innerHTML = `<div class="error-state">Couldn't load progress data.</div>`;
        listsContainer.innerHTML = `<div class="error-state">Couldn't load list data.</div>`;
      }
    }

    const BLOCK_ICONS = { done: "✅", current: "▶️", skipped: "⏭️", pending: "⬜" };

    function renderBlocks(blocks, container) {
      if (blocks.length === 0) {
        container.innerHTML = `<div class="empty-state">No blocks set for today yet.</div>`;
        return;
      }

      const itemsHtml = blocks
        .map(
          (b) => `
        <div class="block-item ${escapeHtml(b.status)}">
          <div class="block-icon">${BLOCK_ICONS[b.status] || "⬜"}</div>
          <div class="block-title">${escapeHtml(b.title)}</div>
        </div>`
        )
        .join("");

      container.innerHTML = `<div class="blocks-card">${itemsHtml}</div>`;
    }

    function timeToMinutes(t) {
      // t looks like "06:00:00" or "06:00"
      const [h, m] = t.split(":").map(Number);
      return h * 60 + m;
    }

    // Assigns each timed block a lane (for side-by-side placement) and the
    // total lane count for its overlapping cluster, so clashing blocks sit
    // next to each other instead of on top of one another.
    function layoutOverlaps(blocks) {
      const sorted = [...blocks].sort((a, b) => a._start - b._start || a._end - b._end);
      const clusters = [];
      let current = [];
      let clusterMaxEnd = -Infinity;

      for (const b of sorted) {
        if (current.length && b._start >= clusterMaxEnd) {
          clusters.push(current);
          current = [];
          clusterMaxEnd = -Infinity;
        }
        current.push(b);
        clusterMaxEnd = Math.max(clusterMaxEnd, b._end);
      }
      if (current.length) clusters.push(current);

      for (const cluster of clusters) {
        const laneEnds = [];
        for (const b of cluster) {
          let placed = false;
          for (let i = 0; i < laneEnds.length; i++) {
            if (laneEnds[i] <= b._start) {
              b._lane = i;
              laneEnds[i] = b._end;
              placed = true;
              break;
            }
          }
          if (!placed) {
            b._lane = laneEnds.length;
            laneEnds.push(b._end);
          }
        }
        for (const b of cluster) b._totalLanes = laneEnds.length;
      }
      return sorted;
    }

    function renderWeek(weekBlocksData, container) {
      const dates = Object.keys(weekBlocksData).sort();

      // Determine a shared time range across the whole week so every day
      // column lines up against the same hour gutter.
      let rangeStartMin = null;
      let rangeEndMin = null;
      for (const date of dates) {
        for (const b of weekBlocksData[date]) {
          if (!b.scheduled_time) continue;
          const s = timeToMinutes(b.scheduled_time);
          const e = b.end_time ? timeToMinutes(b.end_time) : s + 60;
          if (rangeStartMin === null || s < rangeStartMin) rangeStartMin = s;
          if (rangeEndMin === null || e > rangeEndMin) rangeEndMin = e;
        }
      }
      if (rangeStartMin === null) {
        rangeStartMin = 5 * 60; // 5am default
        rangeEndMin = 22 * 60; // 10pm default
      } else {
        rangeStartMin = Math.max(0, Math.floor((rangeStartMin - 60) / 60) * 60);
        rangeEndMin = Math.min(24 * 60, Math.ceil((rangeEndMin + 60) / 60) * 60);
      }
      const pxPerMin = 1;
      const timelineHeight = (rangeEndMin - rangeStartMin) * pxPerMin;

      const todayIso = new Date().toLocaleDateString("en-CA", { timeZone: "Asia/Kolkata" });

      // Build a rolling 7-day range starting from TODAY specifically — never
      // inferred from the data itself, since a stray block dated before
      // today (leftover test data, etc.) would otherwise shift the whole
      // week a day early.
      const allDates = [];
      const base = new Date(todayIso + "T00:00:00");
      for (let i = 0; i < 7; i++) {
        const d = new Date(base);
        d.setDate(d.getDate() + i);
        allDates.push(d.toISOString().split("T")[0]);
      }

      const gutterLabels = [];
      for (let m = rangeStartMin; m <= rangeEndMin; m += 60) {
        gutterLabels.push(`<div class="week-gutter-label" style="top:${(m - rangeStartMin) * pxPerMin}px;">${formatHourLabel(m)}</div>`);
      }

      const dayColumnsHtml = allDates
        .map((dateStr) => {
          const dayBlocks = weekBlocksData[dateStr] || [];
          const timed = dayBlocks
            .filter((b) => b.scheduled_time)
            .map((b) => ({
              ...b,
              _start: timeToMinutes(b.scheduled_time),
              _end: b.end_time ? timeToMinutes(b.end_time) : timeToMinutes(b.scheduled_time) + 60,
            }));
          const flexible = dayBlocks.filter((b) => !b.scheduled_time);

          layoutOverlaps(timed);

          const timedHtml = timed
            .map((b) => {
              const top = (b._start - rangeStartMin) * pxPerMin;
              const height = Math.max(20, (b._end - b._start) * pxPerMin);
              const widthPct = 100 / b._totalLanes;
              const leftPct = b._lane * widthPct;
              const statusClass = b.status === "done" ? "status-done" : "";
              return `
              <div class="timed-block ${statusClass}" style="top:${top}px; height:${height}px; left:${leftPct}%; width:calc(${widthPct}% - 4px);">
                <div class="tb-title">${escapeHtml(b.title)}</div>
                <div class="tb-time">${formatTime12hShort(b.scheduled_time)}</div>
              </div>`;
            })
            .join("");

          const flexibleHtml = flexible.length
            ? flexible
                .map(
                  (b) =>
                    `<div class="flexible-item ${b.status === "done" ? "done" : ""}">${BLOCK_ICONS[b.status] || "⬜"} ${escapeHtml(b.title)}</div>`
                )
                .join("")
            : `<div class="flex-empty">No flexible blocks</div>`;

          const dateObj = new Date(dateStr + "T00:00:00");
          const label = dateObj.toLocaleDateString("en-GB", { weekday: "short", day: "numeric", month: "short" });
          const isToday = dateStr === todayIso;

          return `
          <div class="day-column ${isToday ? "is-today" : ""}">
            <div class="day-header">${label}</div>
            <div class="day-timeline" style="height:${timelineHeight}px;">${timedHtml}</div>
            <div class="flexible-list">${flexibleHtml}</div>
          </div>`;
        })
        .join("");

      container.innerHTML = `
        <div class="week-wrapper">
          <div class="week-gutter" style="height:${timelineHeight + 34}px;">
            <div style="height:34px;"></div>
            ${gutterLabels.join("")}
          </div>
          <div class="week-scroll">${dayColumnsHtml}</div>
        </div>
      `;
    }

    function formatHourLabel(minutes) {
      let h = Math.floor(minutes / 60) % 24;
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12;
      if (h === 0) h = 12;
      return `${h}${ampm}`;
    }

    function formatTime12hShort(time24) {
      const [hStr, mStr] = time24.split(":");
      let h = parseInt(hStr, 10);
      const ampm = h >= 12 ? "PM" : "AM";
      h = h % 12;
      if (h === 0) h = 12;
      return mStr === "00" ? `${h}${ampm}` : `${h}:${mStr}${ampm}`;
    }

    function formatRelativeTime(dateObj) {
      const now = new Date();
      const diffMs = dateObj - now;
      const diffMins = Math.round(diffMs / 60000);
      const diffHours = Math.round(diffMs / 3600000);
      const diffDays = Math.round(diffMs / 86400000);

      if (diffMins < 60 && diffMins >= 0) return `in ${diffMins}m`;
      if (diffMins < 0 && diffMins > -60) return `${-diffMins}m ago`;
      if (diffHours < 24 && diffHours >= 1) return `in ${diffHours}h`;
      if (diffHours < 0 && diffHours > -24) return `${-diffHours}h ago`;
      if (diffDays >= 1) return `in ${diffDays}d`;
      if (diffDays <= -1) return `${-diffDays}d ago`;
      return "now";
    }

    function renderUpcoming(reminders, events, container) {
      const items = [];

      reminders.forEach((r) => {
        items.push({
          type: "reminder",
          icon: "⏰",
          title: r.text,
          date: new Date(r.remind_at),
          meta: new Date(r.remind_at).toLocaleString("en-IN", {
            timeZone: "Asia/Kolkata",
            dateStyle: "medium",
            timeStyle: "short",
          }),
        });
      });

      events.forEach((e) => {
        items.push({
          type: "event",
          icon: "📅",
          title: e.title,
          date: new Date(e.event_date + "T00:00:00"),
          meta: e.event_date + (e.notes ? ` · ${e.notes}` : ""),
        });
      });

      if (items.length === 0) {
        container.innerHTML = `<div class="empty-state">Nothing upcoming.</div>`;
        return;
      }

      items.sort((a, b) => a.date - b.date);

      const itemsHtml = items
        .map(
          (item) => `
        <div class="upcoming-item">
          <div class="upcoming-icon">${item.icon}</div>
          <div class="upcoming-body">
            <div class="upcoming-title">${escapeHtml(item.title)}</div>
            <div class="upcoming-meta">${escapeHtml(item.meta)}</div>
          </div>
          <div class="upcoming-when">${escapeHtml(formatRelativeTime(item.date))}</div>
        </div>`
        )
        .join("");

      container.innerHTML = `<div class="upcoming-card">${itemsHtml}</div>`;
    }

    // Flattens { category: { metric: [entries] } } into [{ metric, entries }]
    // for cross-category views like Consistency.
    function flattenMetrics(progressData) {
      const flat = [];
      for (const category of Object.keys(progressData)) {
        for (const metric of Object.keys(progressData[category])) {
          flat.push({ category, metric, entries: progressData[category][metric] });
        }
      }
      return flat;
    }

    function renderConsistency(progressData, container) {
      const flat = flattenMetrics(progressData);
      if (flat.length === 0) {
        container.innerHTML = `<div class="empty-state">No progress logged yet.</div>`;
        return;
      }

      const sevenDaysAgo = new Date();
      sevenDaysAgo.setHours(0, 0, 0, 0);
      sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 6);

      const counts = flat.map(({ metric, entries }) => {
        const recentCount = entries.filter((e) => {
          const d = new Date(e.entry_date + "T00:00:00");
          return d >= sevenDaysAgo;
        }).length;
        return { metric, count: recentCount };
      });

      counts.sort((a, b) => a.count - b.count || a.metric.localeCompare(b.metric));

      container.innerHTML = `
        <div class="consistency-card">
          <div class="consistency-note">Fewest logs first — these are the ones you're neglecting.</div>
          <div style="height: ${Math.max(120, counts.length * 36)}px;">
            <canvas id="consistency-chart"></canvas>
          </div>
        </div>
      `;

      const ctx = document.getElementById("consistency-chart").getContext("2d");
      new Chart(ctx, {
        type: "bar",
        data: {
          labels: counts.map((c) => c.metric),
          datasets: [{
            label: "Times logged",
            data: counts.map((c) => c.count),
            backgroundColor: counts.map((c) => (c.count === 0 ? "#f87171" : "#6366f1")),
            borderRadius: 4,
            maxBarThickness: 24,
          }],
        },
        options: {
          indexAxis: "y",
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { beginAtZero: true, ticks: { precision: 0 } },
          },
        },
      });
    }

    function computeStats(entries) {
      const total = entries.length;
      const values = entries.map((e) => e.value);
      const best = Math.max(...values);
      const avg = values.reduce((a, b) => a + b, 0) / values.length;
      const lastEntry = entries[entries.length - 1];

      let trend = "flat";
      if (entries.length >= 2) {
        const latest = entries[entries.length - 1].value;
        const priorAvg =
          entries.slice(0, -1).reduce((a, b) => a + b.value, 0) / (entries.length - 1);
        if (latest > priorAvg * 1.05) trend = "up";
        else if (latest < priorAvg * 0.95) trend = "down";
      }

      return { total, best, avg: Math.round(avg * 10) / 10, lastDate: lastEntry.entry_date, trend };
    }

    function renderProgress(progressData, container) {
      const categoryNames = Object.keys(progressData).sort();
      if (categoryNames.length === 0) {
        container.innerHTML = `<div class="empty-state">No progress logged yet.</div>`;
        return;
      }

      container.innerHTML = "";

      categoryNames.forEach((category) => {
        const metricNames = Object.keys(progressData[category]).sort();

        const categoryHeading = document.createElement("h3");
        categoryHeading.className = "category-title";
        categoryHeading.textContent = category;
        container.appendChild(categoryHeading);

        const accordion = document.createElement("div");
        accordion.className = "accordion";
        container.appendChild(accordion);

        metricNames.forEach((metric) => {
          const entries = progressData[category][metric];
          const unit = entries.find((e) => e.unit)?.unit || "";
          const stats = computeStats(entries);
          const metricId = `${category}-${metric}`.replace(/[^a-z0-9]/gi, "-");

          const item = document.createElement("div");
          item.className = "accordion-item";
          item.dataset.metricId = metricId;

          const trendSymbol = stats.trend === "up" ? "▲" : stats.trend === "down" ? "▼" : "●";
          const trendClass = stats.trend === "up" ? "trend-up" : stats.trend === "down" ? "trend-down" : "trend-flat";

          item.innerHTML = `
            <div class="accordion-header">
              <div>
                <div class="accordion-title">${escapeHtml(metric)}</div>
                <div class="accordion-meta">Logged ${stats.total}× · last ${daysAgo(stats.lastDate)}</div>
              </div>
              <div class="accordion-chevron">▾</div>
            </div>
            <div class="accordion-body">
              <div class="stats-row">
                <div class="stat-box">
                  <div class="stat-value">${stats.total}</div>
                  <div class="stat-label">Logs</div>
                </div>
                <div class="stat-box">
                  <div class="stat-value">${stats.best}${unit ? " " + escapeHtml(unit) : ""}</div>
                  <div class="stat-label">Best</div>
                </div>
                <div class="stat-box">
                  <div class="stat-value">${stats.avg}${unit ? " " + escapeHtml(unit) : ""}</div>
                  <div class="stat-label">Average</div>
                </div>
                <div class="stat-box">
                  <div class="stat-value ${trendClass}">${trendSymbol}</div>
                  <div class="stat-label">Trend</div>
                </div>
              </div>
              <div style="height: 220px;">
                <canvas id="chart-${metricId}"></canvas>
              </div>
            </div>
          `;

          accordion.appendChild(item);

          item.querySelector(".accordion-header").addEventListener("click", () => {
            toggleAccordion(metricId, entries, metric);
          });
        });
      });
    }

    function toggleAccordion(metricId, entries, metricName) {
      const allItems = document.querySelectorAll(".accordion-item");

      if (openMetricId === metricId) {
        document.querySelector(`.accordion-item[data-metric-id="${metricId}"]`).classList.remove("open");
        openMetricId = null;
        return;
      }

      allItems.forEach((el) => el.classList.remove("open"));
      const target = document.querySelector(`.accordion-item[data-metric-id="${metricId}"]`);
      target.classList.add("open");
      openMetricId = metricId;

      if (!chartInstances[metricId]) {
        const ctx = document.getElementById(`chart-${metricId}`).getContext("2d");
        chartInstances[metricId] = new Chart(ctx, {
          type: "line",
          data: {
            labels: entries.map((e) => e.entry_date),
            datasets: [{
              label: metricName,
              data: entries.map((e) => e.value),
              borderColor: "#6366f1",
              backgroundColor: "rgba(99, 102, 241, 0.1)",
              tension: 0.3,
              fill: true,
              pointRadius: 4,
            }],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: { y: { beginAtZero: true } },
          },
        });
      }
    }

    function renderLists(listData, container) {
      const categoryNames = Object.keys(listData).sort();
      if (categoryNames.length === 0) {
        container.innerHTML = `<div class="empty-state">No list items yet.</div>`;
        return;
      }

      container.innerHTML = "";
      container.className = "grid";

      categoryNames.forEach((category) => {
        const items = listData[category];
        const itemsHtml = items
          .map(
            (item) => `
          <li class="${item.status === "done" ? "done" : ""}">
            <span class="checkbox">${item.status === "done" ? "☑" : "☐"}</span>
            <span class="item-title">${escapeHtml(item.title)}</span>
          </li>`
          )
          .join("");

        const card = document.createElement("div");
        card.className = "list-card";
        card.innerHTML = `<h3>${escapeHtml(category)}</h3><ul>${itemsHtml}</ul>`;
        container.appendChild(card);
      });
    }

    loadDashboard();
  </script>
</body>
</html>
